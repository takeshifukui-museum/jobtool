<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Museum Jobtool</title>
    <style>
      body {
        font-family: "BIZ UDPゴシック", Arial, sans-serif;
        margin: 12px;
        min-width: 400px;
        max-width: 500px;
      }
      label { font-size: 12px; }
      input[type="text"] { width: 100%; margin: 4px 0; box-sizing: border-box; }
      button {
        width: 100%;
        padding: 8px;
        font-size: 14px;
        margin-top: 4px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #btn-render {
        background: #2563eb;
        color: #fff;
        border: 1px solid #1d4ed8;
        border-radius: 4px;
      }
      #btn-cancel {
        background: #e5e7eb;
        color: #333;
        border: 1px solid #d1d5db;
        border-radius: 4px;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        white-space: pre-line;
      }
      #preview-area {
        display: none;
        margin-top: 8px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        max-height: 360px;
        overflow-y: auto;
        padding: 8px;
        font-size: 11px;
        background: #f9fafb;
        white-space: pre-wrap;
        word-break: break-all;
      }
      #warnings {
        display: none;
        margin-top: 4px;
        padding: 6px;
        background: #fef3c7;
        border: 1px solid #f59e0b;
        border-radius: 4px;
        font-size: 11px;
        white-space: pre-line;
      }
      #warnings .warn-error {
        color: #dc2626;
        font-weight: bold;
      }
      #warnings .warn-info {
        color: #92400e;
      }
      .btn-row {
        display: none;
        gap: 8px;
        margin-top: 8px;
      }
      .btn-row button { width: auto; flex: 1; }
      /* --- 保存先フォルダ設定 --- */
      .folder-settings {
        margin-bottom: 8px;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        padding: 8px;
        background: #f9fafb;
      }
      .folder-settings .folder-heading {
        font-size: 11px;
        font-weight: bold;
        color: #6b7280;
        margin-bottom: 4px;
      }
      .folder-row {
        margin-bottom: 4px;
      }
      .folder-row:last-child {
        margin-bottom: 0;
      }
      .input-with-btn {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .input-with-btn input[type="text"] {
        flex: 1;
        margin: 2px 0;
        font-size: 11px;
      }
      .btn-browse {
        width: auto !important;
        padding: 4px 8px !important;
        font-size: 11px !important;
        margin-top: 0 !important;
        white-space: nowrap;
        background: #e5e7eb;
        border: 1px solid #d1d5db;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div class="folder-settings">
      <div class="folder-heading">出力先フォルダ</div>
      <div class="folder-row">
        <label>Word保存先</label>
        <div class="input-with-btn">
          <input type="text" id="word-output-dir" placeholder="未指定（ダウンロード時に選択）" />
          <button type="button" id="btn-browse-word" class="btn-browse">参照</button>
        </div>
      </div>
      <div class="folder-row">
        <label>テキスト保存先</label>
        <div class="input-with-btn">
          <input type="text" id="text-output-dir" placeholder="未指定" />
          <button type="button" id="btn-browse-text" class="btn-browse">参照</button>
        </div>
      </div>
    </div>

    <button id="btn-generate">求人票を解析</button>

    <div id="warnings"></div>
    <div id="preview-area"></div>
    <div class="btn-row" id="btn-row">
      <button id="btn-render">OK — Word生成</button>
      <button id="btn-cancel">キャンセル</button>
    </div>

    <div id="status">待機中</div>
    <script src="popup.js"></script>
  </body>
</html>
